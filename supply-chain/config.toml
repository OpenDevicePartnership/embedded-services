
# cargo-vet config file

[cargo-vet]
version = "0.10"

[imports.OpenDevicePartnership]
url = "https://raw.githubusercontent.com/OpenDevicePartnership/rust-crate-audits/main/audits.toml"

[imports.bytecode-alliance]
url = "https://raw.githubusercontent.com/bytecodealliance/wasmtime/main/supply-chain/audits.toml"

[imports.google]
url = "https://raw.githubusercontent.com/google/rust-crate-audits/main/audits.toml"

[imports.mozilla]
url = "https://raw.githubusercontent.com/mozilla/supply-chain/main/audits.toml"

[policy.embassy-imxrt]
audit-as-crates-io = false

[policy.keyberon]
audit-as-crates-io = false

[[exemptions.anyhow]]
version = "1.0.103"
criteria = "safe-to-deploy"
notes = "Security bump for RUSTSEC-2026-0190 (unsoundness in anyhow 1.0.102 Error::downcast_mut). anyhow 1.0.103 was published after the trusted-publisher (dtolnay) window in audits.toml ended (2026-04-16). Follow-up: drop this exemption once the [[trusted.anyhow]] window is extended to cover 1.0.103."
